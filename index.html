<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>iDROID OS — V7.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══ TOP BAR ══ -->
<header id="topbar">
  <div class="tb-left">
    <span class="tb-diamond">◈</span>
    <span class="tb-title">iDROID OS</span>
    <span class="tb-ver">V7.0</span>
  </div>
  <div class="tb-center">
    <button class="tb-nav on" data-v="today">▶ HOY</button>
    <button class="tb-nav" data-v="media">◉ BIBLIOTECA</button>
  </div>
  <div class="tb-right">
    <div class="tb-sync" id="tb-sync">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">LOCAL</span>
    </div>
    <span class="tb-date" id="tb-date"></span>
    <button class="tb-cfg-btn" id="cfg-btn">⚙</button>
  </div>
</header>

<!-- ══ MAIN ══ -->
<main id="main">
  <div id="v-today"  class="view on"></div>
  <div id="v-media"  class="view"></div>
</main>

<!-- ══ MODAL ══ -->
<div id="modal" class="modal hide"></div>

<script src="script.js"></script>
</body>
</html>
