<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SURVIVAL VIEWER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM — MGS3 SURVIVAL VIEWER v2
   Amber CRT on deep black. Coherent. Precise. Fast.
═══════════════════════════════════════════════════ */
:root {
  --bg:        #060806;
  --bg2:       #0b0e09;
  --bg3:       #111410;
  --bg4:       #181b15;
  --bg5:       #1f231b;
  --bd:        rgba(180,145,55,.13);
  --bd2:       rgba(180,145,55,.26);
  --bd3:       rgba(180,145,55,.52);
  --t1:        #e6d696;
  --t2:        #b39442;
  --t3:        #665618;
  --t4:        #352c0c;
  --acc:       #d2a82c;
  --acc2:      #eec845;
  --acc-f:     #060806;
  --red:       #bf3830;
  --red-dim:   rgba(191,56,48,.12);
  --grn:       #56a05e;
  --grn-dim:   rgba(86,160,94,.10);
  --blu:       #4688b0;
  --blu-dim:   rgba(70,136,176,.10);
  --org:       #c87828;
  --org-dim:   rgba(200,120,40,.10);
  --crt:       rgba(230,214,150,.022);
  --sans:      'Inter', system-ui, sans-serif;
  --mono:      'Share Tech Mono', 'Courier New', monospace;
  --sw:        200px;
  --tr:        .10s;
  --radius:    0px;
}

/* CRT scanlines overlay */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background: repeating-linear-gradient(0deg,
    var(--crt) 0px, var(--crt) 1px,
    transparent 1px, transparent 4px);
}
/* Top accent line — MGS codec feel */
body::before {
  content:''; position:fixed; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--acc) 30%, var(--acc2) 50%, var(--acc) 70%, transparent);
  z-index:9999; pointer-events:none; opacity:.6;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:var(--sans); font-size:14px; line-height:1.5;
  background:var(--bg); color:var(--t1);
  display:flex; height:100%; overflow:hidden;
}
button{cursor:pointer;font:inherit;border:none;background:none;-webkit-tap-highlight-color:transparent}
input,textarea,select{font:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--t4)}

/* ─── SIDEBAR ──────────────────────────────────── */
#sb{
  width:var(--sw); min-height:100vh;
  border-right:1px solid var(--bd);
  display:flex; flex-direction:column;
  position:fixed; top:0; left:0;
  background:var(--bg2); z-index:20;
  overflow-y:auto;
}
.sb-head{
  padding:1.1rem .9rem .9rem;
  border-bottom:1px solid var(--bd);
  position:relative;
}
.sb-head::after{
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, var(--acc), transparent);
  opacity:.4;
}
.sb-title{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--acc2);text-transform:uppercase}
.sb-sub{font-family:var(--mono);font-size:8px;color:var(--t4);letter-spacing:.1em;margin-top:1px;text-transform:uppercase}
.sb-uptime{
  display:flex; align-items:center; gap:5px;
  margin-top:7px; font-family:var(--mono);
  font-size:8.5px; color:var(--t3); letter-spacing:.07em;
}
.sb-dot{width:5px;height:5px;background:var(--grn);flex-shrink:0;animation:pulse 2.4s ease-in-out infinite;clip-path:polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.9)}50%{opacity:1;transform:scale(1)}}

.sb-nav{flex:1;padding:.4rem 0}
.sb-sec{
  font-family:var(--mono);font-size:7.5px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--t4);
  padding:.65rem .9rem .2rem;
}
.nb{
  display:flex; align-items:center; gap:8px;
  padding:6px .9rem; width:100%; text-align:left;
  font-family:var(--mono); font-size:10px; letter-spacing:.06em;
  color:var(--t4); transition:color var(--tr), background var(--tr);
  border-left:2px solid transparent; position:relative;
}
.nb:hover{color:var(--t2);background:var(--bg3)}
.nb.on{color:var(--acc2);background:rgba(210,168,44,.06);border-left-color:var(--acc)}
.nb svg{flex-shrink:0;opacity:.4;transition:opacity var(--tr)}
.nb.on svg,.nb:hover svg{opacity:1}
.nb-ct{
  margin-left:auto; font-family:var(--mono);font-size:7.5px;
  background:var(--acc);color:var(--acc-f);
  padding:0px 4px; line-height:1.5;
}

.sb-bot{padding:.6rem;border-top:1px solid var(--bd);margin-top:auto}
.cfg-btn{
  display:flex; align-items:center; gap:7px;
  padding:5px 8px; width:100%;
  border:1px solid var(--bd); font-family:var(--mono);
  font-size:8.5px; letter-spacing:.07em; color:var(--t4);
  transition:all var(--tr);
}
.cfg-btn:hover{border-color:var(--bd2);color:var(--t2);background:var(--bg3)}

/* ─── MAIN ─────────────────────────────────────── */
#main{margin-left:var(--sw);flex:1;overflow-x:hidden;overflow-y:auto;height:100vh}
.view{display:none;padding:1.6rem 2rem;max-width:840px}
.view.on{display:block}

/* ─── PAGE HEADER ──────────────────────────────── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.4rem;gap:1rem;flex-wrap:wrap}
.ph-title{font-family:var(--mono);font-size:14px;letter-spacing:.14em;color:var(--acc2);text-transform:uppercase;line-height:1.2}
.ph-sub{font-family:var(--mono);font-size:8.5px;color:var(--t3);margin-top:2px;letter-spacing:.08em;text-transform:uppercase}

/* Day type badge */
.dt-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;
  border:1px solid var(--bd2);padding:1px 6px;color:var(--t3);
  text-transform:uppercase;margin-left:6px;vertical-align:middle;
}
.dt-badge.weekend{border-color:rgba(86,160,94,.3);color:var(--grn)}
.dt-badge.workday{border-color:var(--bd2);color:var(--t3)}
.dt-badge.freeday{border-color:rgba(86,160,94,.3);color:var(--grn)}

/* ─── DATE NAV ─────────────────────────────────── */
.dn{display:flex;align-items:center;gap:3px;margin-top:4px}
.dn-btn{
  width:22px;height:22px;border:1px solid var(--bd2);
  color:var(--t2);font-family:var(--mono);font-size:11px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--tr);
}
.dn-btn:hover{background:var(--bg3);border-color:var(--bd3);color:var(--acc)}
.dn-btn:disabled{opacity:.18;cursor:default}
.dn-now{
  font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;
  color:var(--t3);border:1px solid var(--bd);
  padding:1px 7px;transition:all var(--tr);text-transform:uppercase;
}
.dn-now:hover{border-color:var(--bd2);color:var(--t2)}

/* ─── SECTION ──────────────────────────────────── */
.sec{margin-bottom:1.35rem}
.sec-hd{
  display:flex;align-items:center;gap:7px;
  margin-bottom:9px; padding-bottom:5px;
  border-bottom:1px solid var(--bd);
}
.sec-label{
  font-family:var(--mono);font-size:8px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--t3);
}
.sec-hd::before{content:'▸';font-family:var(--mono);font-size:7px;color:var(--acc);opacity:.7}
.sec-count{
  margin-left:auto;font-family:var(--mono);font-size:7.5px;
  color:var(--t4);letter-spacing:.05em;
}

/* ─── SCORE BLOCK ──────────────────────────────── */
.score-wrap{
  display:flex;align-items:stretch;
  border:1px solid var(--bd2);background:var(--bg3);
  margin-bottom:1.35rem; overflow:hidden; position:relative;
}
.score-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--acc);opacity:.8}
.score-grade-col{
  width:76px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-right:1px solid var(--bd);padding:.9rem .4rem;
  background:rgba(210,168,44,.03);
}
.score-grade{font-family:var(--mono);font-size:44px;line-height:1;color:var(--acc2)}
.score-grade.gs{color:#eece5a;text-shadow:0 0 18px rgba(238,206,90,.35)}
.score-grade.ga{color:var(--acc2)}
.score-grade.gb{color:var(--t2)}
.score-grade.gc{color:#c09838}
.score-grade.gd{color:var(--red)}
.score-pts{font-family:var(--mono);font-size:7.5px;color:var(--t4);margin-top:2px;letter-spacing:.05em}

.score-right{flex:1;padding:.8rem 1rem;display:flex;flex-direction:column;gap:6px}
.score-desc{font-size:11.5px;color:var(--t2);font-weight:300;line-height:1.55;font-style:italic}
.score-bars{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.sbar-row{display:flex;align-items:center;gap:7px}
.sbar-lbl{font-family:var(--mono);font-size:7.5px;color:var(--t4);width:60px;text-align:right;letter-spacing:.04em;flex-shrink:0}
.sbar-track{flex:1;height:2px;background:var(--bg5);position:relative}
.sbar-fill{height:100%;transition:width .4s cubic-bezier(.22,1,.36,1)}
.sbar-fill.f-well{background:var(--acc)}
.sbar-fill.f-slp{background:var(--blu)}
.sbar-fill.f-hab{background:var(--grn)}
.sbar-val{font-family:var(--mono);font-size:7.5px;color:var(--t3);width:26px;text-align:right;flex-shrink:0}
.score-empty{font-family:var(--mono);font-size:9.5px;color:var(--t4);letter-spacing:.06em;padding:.7rem .9rem}

/* ─── HABIT SECTION CARDS ──────────────────────── */
/* Coherent section grouping with visual separation */
.hab-section{
  border:1px solid var(--bd);background:var(--bg3);
  margin-bottom:.75rem;overflow:hidden;
}
.hab-section-hd{
  display:flex;align-items:center;gap:7px;
  padding:5px 10px;background:var(--bg4);
  border-bottom:1px solid var(--bd);
}
.hab-section-icon{font-size:9px;opacity:.6}
.hab-section-lbl{
  font-family:var(--mono);font-size:7.5px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--t3);
}
.hab-section-score{
  margin-left:auto;font-family:var(--mono);font-size:7.5px;color:var(--t4);
}
.hab-section-body{padding:8px 10px;display:flex;flex-wrap:wrap;gap:4px}

/* ─── HABIT TILES ──────────────────────────────── */
.ht{
  display:flex;align-items:center;gap:6px;
  padding:6px 9px;border:1px solid var(--bd);background:var(--bg4);
  color:var(--t4);font-family:var(--mono);font-size:10px;
  letter-spacing:.03em;cursor:pointer;
  transition:border-color var(--tr),background var(--tr),color var(--tr);
  user-select:none; flex:1; min-width:120px; max-width:200px;
  position:relative;
}
.ht:hover{border-color:var(--bd2);color:var(--t3)}
/* Positive habit — green */
.ht.on-grn{border-color:rgba(86,160,94,.45);background:rgba(86,160,94,.07);color:var(--grn)}
/* Negative habit done (avoided) — gold */
.ht.on{border-color:rgba(210,168,44,.45);background:rgba(210,168,44,.07);color:var(--acc)}
/* Bad habit done (drink/missed) — red */
.ht.on-red{border-color:rgba(191,56,48,.35);background:rgba(191,56,48,.07);color:var(--red)}
.ht-box{width:9px;height:9px;border:1px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:.45;transition:opacity var(--tr)}
.ht.on .ht-box,.ht.on-grn .ht-box,.ht.on-red .ht-box{opacity:1;background:currentColor}
.ht-ck{display:none}
.ht.on .ht-ck,.ht.on-grn .ht-ck,.ht.on-red .ht-ck{display:block;color:var(--bg)}

/* ─── QUANTITY CONTROLS ─────────────────────────── */
.ht-qty{display:flex;align-items:stretch;flex:1;min-width:150px;max-width:240px}
.ht-qty-label{
  display:flex;align-items:center;gap:6px;
  padding:6px 9px;border:1px solid var(--bd);border-right:none;
  background:var(--bg4);color:var(--t4);
  font-family:var(--mono);font-size:10px;letter-spacing:.03em;flex:1;
  transition:border-color var(--tr),background var(--tr),color var(--tr);
}
.ht-qty-controls{display:flex;border:1px solid var(--bd);background:var(--bg5)}
.ht-qty-btn{
  width:24px;display:flex;align-items:center;
  justify-content:center;color:var(--t3);font-family:var(--mono);
  font-size:14px;transition:all var(--tr);
}
.ht-qty-btn:hover{color:var(--acc);background:var(--bg4)}
.ht-qty-val{
  min-width:26px;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:11px;
  color:var(--t3);border-left:1px solid var(--bd);border-right:1px solid var(--bd);
  padding:0 3px; transition:color var(--tr);
}
.ht-qty.has-val .ht-qty-label{border-color:rgba(210,168,44,.35);background:rgba(210,168,44,.05);color:var(--acc)}
.ht-qty.has-val .ht-qty-controls{border-color:rgba(210,168,44,.35)}
.ht-qty.has-val .ht-qty-val{color:var(--acc2)}
/* Water — blue tint when filled */
.ht-qty.blu.has-val .ht-qty-label{border-color:rgba(70,136,176,.35);background:rgba(70,136,176,.06);color:var(--blu)}
.ht-qty.blu.has-val .ht-qty-controls{border-color:rgba(70,136,176,.35)}
.ht-qty.blu.has-val .ht-qty-val{color:var(--blu)}
/* Drinks — red tint */
.ht-qty.red.has-val .ht-qty-label{border-color:rgba(191,56,48,.35);background:rgba(191,56,48,.06);color:var(--red)}
.ht-qty.red.has-val .ht-qty-controls{border-color:rgba(191,56,48,.35)}
.ht-qty.red.has-val .ht-qty-val{color:var(--red)}

/* Water fill visualizer */
.water-bar{
  position:absolute;bottom:0;left:0;height:2px;
  background:var(--blu);transition:width .3s ease;opacity:.6;
}

/* ─── SELECT CONTROLS ──────────────────────────── */
.ht-sel{display:flex;align-items:stretch;flex:1;min-width:150px;max-width:240px}
.ht-sel-label{
  display:flex;align-items:center;gap:6px;
  padding:6px 9px;border:1px solid var(--bd);border-right:none;
  background:var(--bg4);color:var(--t4);
  font-family:var(--mono);font-size:10px;letter-spacing:.03em;flex:1;
  transition:all var(--tr);
}
.ht-sel select{
  padding:0 7px;border:1px solid var(--bd);border-left:none;
  background:var(--bg5);color:var(--t3);
  font-family:var(--mono);font-size:9.5px;
  outline:none;cursor:pointer;min-width:72px;
  transition:border-color var(--tr);
}
.ht-sel select:focus{border-color:var(--bd3)}
.ht-sel.has-val .ht-sel-label{border-color:rgba(210,168,44,.35);background:rgba(210,168,44,.05);color:var(--acc)}
.ht-sel.has-val select{border-color:rgba(210,168,44,.35);color:var(--acc)}
/* Social quality levels */
.ht-sel.soc-none .ht-sel-label{color:var(--t4)}
.ht-sel.soc-brief .ht-sel-label{border-color:rgba(210,168,44,.2);color:var(--t3)}
.ht-sel.soc-meaningful .ht-sel-label{border-color:rgba(210,168,44,.4);background:rgba(210,168,44,.05);color:var(--acc)}
.ht-sel.soc-deep .ht-sel-label{border-color:rgba(86,160,94,.4);background:rgba(86,160,94,.06);color:var(--grn)}
.ht-sel.soc-deep select{border-color:rgba(86,160,94,.4);color:var(--grn)}

/* ─── SLIDERS ──────────────────────────────────── */
.sl-row{display:flex;align-items:center;gap:12px;padding:3px 0}
.sl-meta{width:130px;flex-shrink:0}
.sl-name{font-size:12.5px;color:var(--t1);font-weight:400}
.sl-hint{font-family:var(--mono);font-size:8px;color:var(--t4);margin-top:1px}
.sl-wrap{flex:1;display:flex;align-items:center;gap:8px}
input[type=range]{
  flex:1;height:2px;-webkit-appearance:none;appearance:none;
  background:var(--bg5);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  background:var(--acc);cursor:pointer;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
}
input[type=range]::-moz-range-thumb{
  width:12px;height:12px;background:var(--acc);border:none;cursor:pointer;
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
}
.sl-val{font-family:var(--mono);font-size:13px;color:var(--acc2);min-width:20px;text-align:right}
.sl-val.muted{color:var(--t4)}

/* ─── SMALL INPUTS ─────────────────────────────── */
.inp{
  padding:5px 8px;border:1px solid var(--bd);
  background:var(--bg4);color:var(--t1);
  font-family:var(--mono);font-size:11.5px;outline:none;
  transition:border-color var(--tr);
}
.inp:focus{border-color:var(--bd3)}
.inp-t{width:96px}
.inp-n{width:68px}

/* ─── NOTES ─────────────────────────────────────── */
.nt{
  width:100%;min-height:58px;
  padding:8px 10px;border:1px solid var(--bd);
  background:var(--bg4);color:var(--t1);
  font-family:var(--mono);font-size:11px;
  resize:vertical;outline:none;line-height:1.7;
  transition:border-color var(--tr);
}
.nt:focus{border-color:var(--bd3)}
.nt::placeholder{color:var(--t4)}

/* ─── SAVE ROW ─────────────────────────────────── */
.save-row{
  display:flex;align-items:center;gap:7px;
  padding-top:1rem;border-top:1px solid var(--bd);
  flex-wrap:wrap;
}
.save-ok{font-family:var(--mono);font-size:8.5px;color:var(--grn);margin-right:auto;opacity:0;transition:opacity .25s;letter-spacing:.12em}
.save-ok.show{opacity:1}
.btn-p{
  padding:5px 14px;background:var(--acc);color:var(--acc-f);
  font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  transition:opacity var(--tr);border:none;
}
.btn-p:hover{opacity:.82}
.btn-p:disabled{opacity:.3;cursor:default}
.btn-s{
  padding:5px 11px;border:1px solid var(--bd2);
  font-family:var(--mono);font-size:9.5px;color:var(--t2);
  letter-spacing:.06em;text-transform:uppercase;
  transition:all var(--tr);
}
.btn-s:hover{background:var(--bg3);border-color:var(--bd3);color:var(--t1)}
.btn-s:disabled{opacity:.3;cursor:default}

/* ─── AI PROVIDER ROW ──────────────────────────── */
.ai-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ai-sel{
  padding:4px 8px;border:1px solid var(--bd);background:var(--bg4);
  color:var(--t2);font-family:var(--mono);font-size:9.5px;
  outline:none;cursor:pointer;letter-spacing:.04em;
}
.ai-sel:focus{border-color:var(--bd3)}

/* ─── AI RESULT ─────────────────────────────────── */
.ai-box{
  border:1px solid var(--bd2);background:var(--bg3);
  padding:1rem 1.2rem;margin-top:.9rem;position:relative;
}
.ai-box-tag{
  font-family:var(--mono);font-size:7.5px;letter-spacing:.14em;
  color:var(--t3);position:absolute;top:-1px;left:10px;
  background:var(--bg3);padding:0 5px;transform:translateY(-50%);
  text-transform:uppercase;
}
.ai-box p{font-size:12.5px;color:var(--t2);line-height:1.7;font-weight:300}
.ai-box p+p{margin-top:.55rem}

/* ─── ANALYTICS ─────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:6px;margin-bottom:1.35rem}
.stat{background:var(--bg3);border:1px solid var(--bd);padding:9px 11px;position:relative}
.stat::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--acc);opacity:.3}
.stat-lbl{font-family:var(--mono);font-size:7.5px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.stat-val{font-family:var(--mono);font-size:20px;color:var(--acc2);line-height:1.1}
.stat-val.empty{font-size:16px;color:var(--t4)}
.stat-sub{font-family:var(--mono);font-size:7.5px;color:var(--t3);margin-top:2px}
.stat-delta{font-family:var(--mono);font-size:8px;margin-top:3px}
.du{color:var(--grn)}.dd{color:var(--red)}.dn{color:var(--t3)}

.chart-wrap{border:1px solid var(--bd);background:var(--bg3);padding:10px 11px;margin-bottom:1.1rem}
.chart-lbl{font-family:var(--mono);font-size:7.5px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
.chart-lbls{display:flex;justify-content:space-between;margin-top:3px}
.chart-lbls span{font-family:var(--mono);font-size:7.5px;color:var(--t4);flex:1;text-align:center}
.no-data{height:40px;display:flex;align-items:center;font-family:var(--mono);font-size:9.5px;color:var(--t4)}

.hab-table{width:100%;border-collapse:collapse}
.hab-table td{padding:4px 0;border-bottom:1px solid var(--bd);vertical-align:middle}
.hab-table td:first-child{font-family:var(--mono);font-size:10px;color:var(--t1)}
.hab-table td:last-child{font-family:var(--mono);text-align:right;font-size:8.5px;color:var(--t3);white-space:nowrap}
.hbar-wrap{width:68px;height:2px;background:var(--bg5);display:inline-block;vertical-align:middle;margin:0 7px}
.hbar{height:100%;background:var(--acc)}

.mood-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;margin-top:5px}
.mood-dot{height:16px;background:var(--bg5);border:1px solid var(--bd)}
.legend{display:flex;gap:9px;margin-top:7px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:7.5px;color:var(--t3)}
.legend-dot{width:7px;height:7px;flex-shrink:0}

/* ─── MEDIA ──────────────────────────────────────── */
/* Tab bar */
.mtabs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:1rem}
.mtab{
  padding:5px 11px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;
  color:var(--t4);transition:all var(--tr);border-bottom:2px solid transparent;margin-bottom:-1px;
}
.mtab:hover{color:var(--t2)}
.mtab.on{color:var(--acc2);border-bottom-color:var(--acc)}
.mtab-ct{font-size:7.5px;color:var(--t3);margin-left:3px;vertical-align:middle}

/* Media columns */
.media-cols{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
@media(max-width:680px){.media-cols{grid-template-columns:1fr}}

/* Media progress section — NEW coherent design */
.media-progress-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 0; border-bottom:1px solid var(--bd);
}
.media-progress-row:last-child{border-bottom:none}
.mp-status-dot{width:6px;height:6px;flex-shrink:0;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
.mp-info{flex:1;min-width:0}
.mp-title{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-meta{font-family:var(--mono);font-size:8.5px;color:var(--t3);margin-top:1px}
.mp-progress-track{width:60px;height:2px;background:var(--bg5);flex-shrink:0;position:relative}
.mp-progress-fill{height:100%;background:var(--acc);transition:width .3s}
.mp-rating{font-family:var(--mono);font-size:9.5px;color:var(--t2);flex-shrink:0;min-width:28px;text-align:right}
.mp-del{
  width:18px;height:18px;color:var(--t4);font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:color var(--tr);line-height:1;
}

.media-col-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:5px;
}
.media-col-title{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.media-col-add{
  font-family:var(--mono);font-size:8.5px;color:var(--t4);
  border:1px solid var(--bd);padding:1px 6px;
  transition:all var(--tr);letter-spacing:.05em;
}

.media-block{
  border:1px solid var(--bd);background:var(--bg3);

}
.media-block-hd{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:6px;
}
.media-block-title{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}

.mi-empty{font-family:var(--mono);font-size:8.5px;color:var(--t4);padding:4px 0}

/* Progress bar for books */
.progress-pct{
  display:inline-block;font-family:var(--mono);font-size:8px;
  color:var(--acc);border:1px solid var(--bd2);padding:0 4px;
  margin-left:4px;vertical-align:middle;
}

/* ─── YEAR GRID ─────────────────────────────────── */
.year-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px}
.ycard{border:1px solid var(--bd);background:var(--bg3);padding:8px 9px;transition:border-color var(--tr)}
.ycard:hover{border-color:var(--bd2)}
.ycard-type{font-family:var(--mono);font-size:7px;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;margin-bottom:2px}
.ycard-title{font-size:11.5px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ycard-meta{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:2px}
.ycard-score{
  display:inline-block;font-family:var(--mono);font-size:7.5px;
  border:1px solid var(--bd2);color:var(--acc);padding:0 3px;margin-top:3px;
}

/* ─── MODAL ──────────────────────────────────────── */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.78);
  z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;
}
.modal.hide{display:none}
.mbox{

}
.mbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--acc),transparent)}

.mf{margin-bottom:7px}
.mf-label{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.07em;margin-bottom:3px}
.mf-input{
  width:100%;padding:5px 8px;border:1px solid var(--bd);
  background:var(--bg3);color:var(--t1);

  transition:border-color var(--tr);
}

.mactions{display:flex;gap:6px;margin-top:1rem;justify-content:flex-end}

}

/* ─── DIVIDER ───────────────────────────────────── */
.hdiv{
  height:1px;background:linear-gradient(90deg,var(--bd),transparent);

}

/* ─── MOBILE ─────────────────────────────────────── */
#bn{display:none}
@media(max-width:680px){
  #sb{display:none}
  #main{margin-left:0;padding-bottom:54px}

  .sl-meta{width:90px}
  .sl-hint{display:none}

  #bn{
    display:flex;position:fixed;bottom:0;left:0;right:0;

  .bbn{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:2px;color:var(--t4);font-family:var(--mono);font-size:7px;
    letter-spacing:.07em;transition:color var(--tr);
  }
  .bbn.on{color:var(--acc2)}
}
@media(min-width:681px) and (max-width:900px){
  :root{--sw:168px}
  .view{padding:1.3rem 1.3rem}
}

<script>
'use strict';
/* ══════════════════════════════════════════════════
   SURVIVAL VIEWER v2 — Fixed JS
   No triple-nested template literals.
   All HTML built via helper fns + string concat.
══════════════════════════════════════════════════ */

// ── STORAGE ────────────────────────────────────────
const db={
  get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

// ── DATE UTILS ─────────────────────────────────────
const WDAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONS_S=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function today(){const d=new Date();d.setHours(0,0,0,0);return d}
function dk(d){return d.toISOString().slice(0,10)}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function isToday(d){return dk(d)===dk(today())}
function isWeekend(d){return[0,6].includes(d.getDay())}
function fmtFull(d){return WDAYS[d.getDay()]+', '+MONS[d.getMonth()]+' '+d.getDate()}
function fmtShort(d){return d.getDate()+' '+MONS_S[d.getMonth()]}
function thisYear(){return today().getFullYear()}

(function setSbDate(){
  const el=document.getElementById('sb-date');if(!el)return;
  const d=today();
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  el.textContent=dd+'.'+mm+'.'+d.getFullYear()+' '+WDAYS[d.getDay()].slice(0,3).toUpperCase();
})();

/* ══════════════════════════════════════════════════
   HABIT DEFINITIONS
   Sources cited inline in hint fields.
══════════════════════════════════════════════════ */
const HAB_GROUPS=[
  {id:'context',label:'CONTEXT',habits:[
    {id:'daytype',    label:'Day type',      type:'sel',
     opts:['workday','free day','half-free','travel day','sick day'],
     weight:0, hint:'Adjusts score baseline — workday tasks differ from free days'},
    {id:'alcohol_amt',label:'Drinks today',  type:'qty',unit:'drinks',max:8,default:0,
     weight:0,color:'red', hint:'0=none. Dose-dependent penalty on score. IARC Group 1 carcinogen. Suppresses REM (Ebrahim et al., 2013)'},
  ]},
  {id:'body',label:'BODY',habits:[
    {id:'water',    label:'Water intake',        type:'qty',unit:'glasses',max:14,default:0,
     weight:10,color:'blu', hint:'EFSA: 2.5L/day men (~10-11 glasses). >2% dehydration impairs cognition (Cheuvront & Kenefick, 2014)'},
    {id:'meals',    label:'Meals eaten',          type:'qty',unit:'meals',max:5,default:0,
     weight:8,color:'acc', hint:'3 meals = optimal. Skipping raises cortisol & impairs glucose regulation (Pot et al., 2016)'},
    {id:'exercise', label:'Moved body',           type:'bool',weight:12,color:'grn',
     hint:'WHO: 150min/week moderate. Even 1 session = -26% depression risk (Mammen & Faulkner, 2013)'},
    {id:'nosugar',  label:'Avoided sugar/cravings',type:'bool',weight:9,color:'grn',
     hint:'WHO: free sugars <10% daily energy. Cravings managed by stable glucose, not willpower alone'},
    {id:'noultra',  label:'No ultra-processed',   type:'bool',weight:8,color:'grn',
     hint:'NOVA classification. Hall et al. (2019) RCT: ultra-processed +500kcal/day unintentionally. Linked to depression'},
    {id:'noalcohol',label:'Alcohol-free day',      type:'bool',weight:11,color:'grn',
     hint:'Any amount = risk. Suppresses REM sleep & impairs recovery. IARC Group 1 carcinogen'},
    {id:'hygiene',  label:'Full hygiene routine',  type:'bool',weight:5,color:'acc',
     hint:'Shower, teeth, grooming. Behavioral activation signal anchors self-identity (Martell et al., 2010)'},
  ]},
  {id:'mind',label:'MIND',habits:[
    {id:'outside',  label:'Time outside',          type:'bool',weight:8,color:'grn',
     hint:'Natural light anchors circadian rhythm. Nature walk reduces rumination vs urban walk (Bratman et al., 2015)'},
    {id:'noporn',   label:'No pornography',         type:'bool',weight:10,color:'grn',
     hint:'Habitual use -> reduced striatum volume (reward center). Dampens real-world motivation (Kuhn & Gallinat, 2014)'},
    {id:'noyt',     label:'Avoided binge-YouTube',  type:'bool',weight:7,color:'acc',
     hint:'Variable reward loops (autoplay) chronically lower focus baseline. 1h intentional > 3h passive (Newport, 2019)'},
    {id:'reading',  label:'Read today (5+ pages)',  type:'bool',weight:6,color:'acc',
     hint:'Even 5-10 pages/day compounds. Builds sustained focus tolerance & empathy (Mar et al., 2009)'},
    {id:'creative', label:'Creative work',           type:'bool',weight:7,color:'acc',
     hint:'Agency + mastery = intrinsic motivation. Making something = effort dopamine, not stimulus dopamine (Deci & Ryan, 2000)'},
    {id:'social_q', label:'Social quality',          type:'sel',
     opts:['none','brief (hi/bye)','meaningful (real talk)','deep (vulnerable)'],
     weight:10,color:'acc',
     hint:'Quality > quantity. Loneliness = 15 cig/day health risk. Deep > meaningful > brief > none (Holt-Lunstad, 2015)'},
  ]},
];

const ALL_HABS=HAB_GROUPS.flatMap(g=>g.habits);

/* ══════════════════════════════════════════════════
   MEDIA DEFINITIONS
══════════════════════════════════════════════════ */
const MEDIA_DEF={
  games:{
    label:'Games',sing:'game',yearDone:['Completed'],
    statuses:['Playing','Completed','Paused','Backlog'],
    fields:[
      {id:'title',   label:'Title *',   type:'text',   req:true},
      {id:'status',  label:'Status',    type:'select', opts:['Playing','Completed','Paused','Backlog']},
      {id:'rating',  label:'Score /10', type:'number', min:1,max:10},
      {id:'progress',label:'Progress',  type:'text',   ph:'e.g. 40h / Chapter 5'},
      {id:'year',    label:'Year done', type:'number', min:2020,max:2035},
      {id:'notes',   label:'Notes',     type:'text'},
    ]
  },
  screen:{
    label:'Shows & Films',sing:'show/film',yearDone:['Finished','Watched'],
    statuses:['Watching','Finished','Watched','Paused','Backlog'],
    fields:[
      {id:'title',   label:'Title *',   type:'text',   req:true},
      {id:'kind',    label:'Format',    type:'select', opts:['Series','Film','Documentary','Anime','Mini-series','Short']},
      {id:'progress',label:'Progress',  type:'text',   ph:'e.g. S02E05'},
      {id:'status',  label:'Status',    type:'select', opts:['Watching','Finished','Watched','Paused','Backlog']},
      {id:'rating',  label:'Score /10', type:'number', min:1,max:10},
      {id:'year',    label:'Year done', type:'number', min:2020,max:2035},
    ]
  },
  books:{
    label:'Books',sing:'book',yearDone:['Finished'],
    statuses:['Reading','Finished','Paused','Backlog'],
    fields:[
      {id:'title',   label:'Title *',   type:'text', req:true},
      {id:'author',  label:'Author',    type:'text'},
      {id:'progress',label:'Progress %',type:'number',min:0,max:100,ph:'0-100'},
      {id:'status',  label:'Status',    type:'select',opts:['Reading','Finished','Paused','Backlog']},
      {id:'rating',  label:'Score /10', type:'number',min:1,max:10},
      {id:'year',    label:'Year done', type:'number',min:2020,max:2035},
    ]
  }
};

const STATUS_DOT_COLOR={
  'Playing':'var(--grn)','Watching':'var(--grn)','Reading':'var(--grn)',
  'Completed':'var(--acc)','Finished':'var(--acc)','Watched':'var(--acc)',
  'Paused':'var(--t3)','Backlog':'var(--t4)'
};

/* ══════════════════════════════════════════════════
   AI PROVIDERS
══════════════════════════════════════════════════ */
const AI={
  anthropic:{label:'Claude (Anthropic)',model:'claude-sonnet-4-20250514',key:'ak_anthropic',hint:'sk-ant-...'},
  openai:   {label:'ChatGPT (OpenAI)',  model:'gpt-4o',                  key:'ak_openai',  hint:'sk-...'},
  gemini:   {label:'Gemini (Google)',   model:'gemini-1.5-flash',        key:'ak_gemini',  hint:'AIza...'},
};

async function callAI(provider,prompt){
  const p=AI[provider];
  const key=db.get(p.key)||'';
  if(!key)throw new Error('NO_KEY');
  if(provider==='anthropic'){
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:p.model,max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.content?.[0]?.text||'';
  }
  if(provider==='openai'){
    const r=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:p.model,max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.choices?.[0]?.message?.content||'';
  }
  if(provider==='gemini'){
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+p.model+':generateContent?key='+key,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }
}

/* ══════════════════════════════════════════════════
   SCORING ENGINE
   Sleep (30pts) + Wellbeing (30pts) + Habits (40pts)
   Context-adjusted per day type.
══════════════════════════════════════════════════ */
function calcScore(data){
  let pts=0,maxPts=0;
  const bd={};

  // 1. SLEEP (30pts) — J-curve per Walker/NSF
  const slpMax=30;
  if(data.sleepH!=null){
    const h=parseFloat(data.sleepH)||0;
    let eff;
    if(h>=7&&h<=9)          eff=1.00;
    else if(h>=6.5&&h<7)    eff=0.84;
    else if(h>9&&h<=9.5)    eff=0.87;
    else if(h>=6&&h<6.5)    eff=0.66;
    else if(h>9.5&&h<=10.5) eff=0.72;
    else if(h>=5&&h<6)      eff=0.44;
    else if(h>10.5)          eff=0.55;
    else                     eff=0.22;
    const qb=data.sleepQ!=null?((data.sleepQ-5)/10)*0.14:0;
    eff=Math.min(1,eff+qb);
    const p=Math.round(eff*slpMax);
    pts+=p;bd.sleep={pts:p,max:slpMax};
  }
  maxPts+=slpMax;

  // 2. WELLBEING (30pts) — calm weighted highest (anxiety = core dysregulator)
  const wMax=30;
  if(data.mood!=null||data.energy!=null||data.anxiety!=null){
    const m=data.mood!=null?data.mood:5;
    const e=data.energy!=null?data.energy:5;
    const c=data.anxiety!=null?data.anxiety:5;
    const w=m*0.33+e*0.28+c*0.39;
    const p=Math.round((w/10)*wMax);
    pts+=p;bd.wellbeing={pts:p,max:wMax};
  }
  maxPts+=wMax;

  // 3. HABITS (40pts) — context-adjusted
  const habMax=40;
  let habPts=0,habTotal=0;
  const dt=data.habits&&data.habits.daytype?data.habits.daytype:'workday';
  const isFreeDay=dt==='free day'||dt==='half-free';
  const isSick=dt==='sick day';
  const isTravel=dt==='travel day';
  const habData=data.habits||{};

  ALL_HABS.forEach(function(h){
    if(h.weight===0)return;
    let w=h.weight;
    if(isSick&&['exercise','reading','creative','outside','social_q'].indexOf(h.id)<0){
      // on sick day only basic habits count, rest ignored
    }
    if(isSick&&['exercise','reading','creative','outside','social_q'].indexOf(h.id)>=0){w=Math.round(w*0.15);if(w<1)return}
    if(isTravel&&['exercise','reading','creative'].indexOf(h.id)>=0)w=Math.round(w*0.5);
    if(isFreeDay&&['reading','creative','social_q'].indexOf(h.id)>=0)w=Math.round(w*1.3);
    if(isFreeDay&&h.id==='noyt')w=Math.round(w*1.25);
    if(!isFreeDay&&dt==='workday'&&['social_q','creative'].indexOf(h.id)>=0)w=Math.round(w*0.75);
    habTotal+=w;
    if(h.type==='bool'){
      if(habData[h.id])habPts+=w;
    }else if(h.type==='qty'){
      const v=parseInt(habData[h.id])||0;
      if(h.id==='water'){habPts+=Math.round(Math.min(v/10,1)*w);}
      else if(h.id==='meals'){
        const mm={0:0,1:.3,2:.7,3:1,4:1,5:1};
        habPts+=Math.round((mm[Math.min(v,5)]||0)*w);
      }
    }else if(h.type==='sel'){
      if(h.id==='social_q'){
        const sv={
          'none':0,
          'brief (hi/bye)':.25,
          'meaningful (real talk)':.72,
          'deep (vulnerable)':1
        };
        habPts+=Math.round((sv[habData[h.id]]||0)*w);
      }
    }
  });

  // Alcohol penalty — dose-dependent
  const alc=parseInt(habData.alcohol_amt)||0;
  if(alc>0){habPts=Math.max(0,habPts-Math.round(Math.min(alc*0.075,0.35)*habMax));}

  const habP=habTotal>0?Math.round((habPts/habTotal)*habMax):0;
  pts+=habP;bd.habits={pts:habP,max:habMax};
  maxPts+=habMax;

  const pct=maxPts>0?pts/maxPts:0;
  let grade='D';
  if(pct>=.90)grade='S';
  else if(pct>=.78)grade='A';
  else if(pct>=.63)grade='B';
  else if(pct>=.48)grade='C';

  return{pts,maxPts,pct,grade,bd};
}

══════════════════════════════════════════════════ */
function initSlider(id,field,data,onChange){
  const sl=document.getElementById('sl-'+id);
  const vl=document.getElementById('vl-'+id);
  if(!sl||!vl)return;
  let touched=data[field]!=null;
  if(touched){sl.value=data[field];vl.textContent=data[field];vl.classList.remove('muted')}
  else{sl.value=5;vl.textContent='—';vl.classList.add('muted')}
  function activate(){touched=true;vl.textContent=sl.value;vl.classList.remove('muted')}
  sl.addEventListener('mousedown',activate);
  sl.addEventListener('touchstart',activate,{passive:true});
  sl.addEventListener('input',function(){if(touched)vl.textContent=sl.value;if(onChange)onChange()});
}

let _saveTimer;
function triggerSave(){clearTimeout(_saveTimer);_saveTimer=setTimeout(function(){if(appView==='today')doSave(false)},800)}

function collectDay(){
  const el=document.getElementById('v-today');
  if(!el)return DEF_DAY();
  function mv(id){const v=document.getElementById('vl-'+id);return(v&&v.textContent&&v.textContent!=='—')?parseInt(v.textContent):null}
  const habits={};
  el.querySelectorAll('.ht[data-hid]').forEach(function(b){habits[b.dataset.hid]=b.classList.contains('on')||b.classList.contains('on-grn')||b.classList.contains('on-red')});
  el.querySelectorAll('.ht-qty[data-hid]').forEach(function(wrap){habits[wrap.dataset.hid]=parseInt(wrap.querySelector('.ht-qty-val').textContent)||0});
  el.querySelectorAll('.ht-sel[data-hid]').forEach(function(wrap){habits[wrap.dataset.hid]=wrap.querySelector('select').value||'none'});
  const sleephEl=document.getElementById('inp-sleeph');
  const wakeEl=document.getElementById('inp-wake');
  const notesEl=document.getElementById('inp-notes');
  return{
    mood:mv('mood'),energy:mv('energy'),anxiety:mv('anxiety'),
    sleepH:sleephEl?parseFloat(sleephEl.value)||null:null,
    sleepQ:mv('sleepq'),
    wakeTime:wakeEl?wakeEl.value:'',
    habits:habits,
    notes:notesEl?notesEl.value:''
  };
}

function doSave(badge){
  if(badge===undefined)badge=true;
  saveDay(curDate,collectDay());
  refreshScore();
  if(badge){
    const m=document.getElementById('save-ok');
    if(m){m.classList.add('show');setTimeout(function(){m.classList.remove('show')},1600)}
  }
}

/* ══════════════════════════════════════════════════
   SCORE WIDGET — HTML via string concat, no nesting
══════════════════════════════════════════════════ */
function refreshScore(){
  const el=document.getElementById('score-widget');
  if(!el)return;
  const d=collectDay();
  const habVals=Object.values(d.habits);
  const hasData=d.mood!=null||d.sleepH!=null||habVals.some(function(v){return v&&v!==0&&v!=='none'});
  if(!hasData){
    el.innerHTML='<div class="score-empty">// Fill in any field — score updates live</div>';
    return;
  }
  const s=calcScore(d);
  const bd=s.bd;

  let bars='';
  if(bd.wellbeing){
    const pct=Math.round(bd.wellbeing.pts/bd.wellbeing.max*100);
    bars+='<div class="sbar-row"><span class="sbar-lbl">wellbeing</span><div class="sbar-track"><div class="sbar-fill f-well" style="width:'+pct+'%"></div></div><span class="sbar-val">'+bd.wellbeing.pts+'/'+bd.wellbeing.max+'</span></div>';
  }
  if(bd.sleep){
    const pct=Math.round(bd.sleep.pts/bd.sleep.max*100);
    bars+='<div class="sbar-row"><span class="sbar-lbl">sleep</span><div class="sbar-track"><div class="sbar-fill f-slp" style="width:'+pct+'%"></div></div><span class="sbar-val">'+bd.sleep.pts+'/'+bd.sleep.max+'</span></div>';
  }
  if(bd.habits){
    const pct=Math.round(bd.habits.pts/bd.habits.max*100);
    bars+='<div class="sbar-row"><span class="sbar-lbl">habits</span><div class="sbar-track"><div class="sbar-fill f-hab" style="width:'+pct+'%"></div></div><span class="sbar-val">'+bd.habits.pts+'/'+bd.habits.max+'</span></div>';
  }

  el.innerHTML='<div class="score-wrap">'
    +'<div class="score-grade-col">'
    +'<div class="score-grade '+GRADE_CLASS[s.grade]+'">'+s.grade+'</div>'
    +'<div class="score-pts">'+s.pts+'/'+s.maxPts+'</div>'
    +'</div>'
    +'<div class="score-right">'
    +'<div class="score-desc">'+GRADE_DESC[s.grade]+'</div>'
    +'<div class="score-bars">'+bars+'</div>'
    +'</div></div>';
}

/* ══════════════════════════════════════════════════
   HABIT INPUT RENDERERS — string concat, no nesting
══════════════════════════════════════════════════ */
function ckSVG(){
  return '<svg width="6" height="5" viewBox="0 0 6 5" fill="none"><polyline points=".8,2.5 2.3,4.2 5.2,.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function ckSVGbg(){
  return '<svg width="6" height="5" viewBox="0 0 6 5" fill="none"><polyline points=".8,2.5 2.3,4.2 5.2,.8" stroke="var(--bg)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function renderHabitInput(h,habData){
  if(!h)return'';
  if(h.type==='bool'){
    const isOn=!!habData[h.id];
    const cls=isOn?' on-grn':'';
    return '<button class="ht'+cls+'" data-hid="'+h.id+'" title="'+h.hint+'">'
      +'<div class="ht-box"><span class="ht-ck">'+ckSVG()+'</span></div>'
      +h.label+'</button>';
  }
  if(h.type==='qty'){
    const val=parseInt(habData[h.id])||0;
    const colorCls=h.color==='blu'?' blu':h.color==='red'?' red':'';
    const hasCls=val>0?' has-val':'';
    let waterBar='';
    if(h.id==='water'){
      const pct=Math.min(Math.round(val/10*100),100);
      waterBar='<div class="water-bar" style="width:'+pct+'%"></div>';
    }
    return '<div class="ht-qty'+hasCls+colorCls+'" data-hid="'+h.id+'" title="'+h.hint+'" style="position:relative">'
      +'<div class="ht-qty-label"><div class="ht-box" style="pointer-events:none"></div>'+h.label+'</div>'
      +'<div class="ht-qty-controls">'
      +'<button class="ht-qty-btn qty-dec">−</button>'
      +'<div class="ht-qty-val">'+val+'</div>'
      +'<button class="ht-qty-btn qty-inc">+</button>'
      +'</div>'+waterBar+'</div>';
  }
  if(h.type==='sel'){
    const val=habData[h.id]||'';
    const hasVal=val&&val!=='none'&&val!=='';
    const hasCls=hasVal?' has-val':'';
    let boxInner='';
    if(hasVal)boxInner='<span style="background:currentColor;border-color:currentColor;display:inline-flex;align-items:center;justify-content:center;width:9px;height:9px;">'+ckSVGbg()+'</span>';
    let opts='<option value="">—</option>';
    h.opts.forEach(function(o){
      opts+='<option value="'+o+'"'+(val===o?' selected':'')+'>'+o+'</option>';
    });
    return '<div class="ht-sel'+hasCls+'" data-hid="'+h.id+'" title="'+h.hint+'">'
      +'<div class="ht-sel-label"><div class="ht-box" style="pointer-events:none">'+boxInner+'</div>'+h.label+'</div>'
      +'<select>'+opts+'</select>'
      +'</div>';
  }
  return'';
}

  el.querySelector('#btn-save').onclick=function(){doSave(true)};
  el.querySelector('#btn-prev').onclick=function(){curDate=addD(curDate,-1);renderToday()};
  const nxBtn=el.querySelector('#btn-next');if(nxBtn)nxBtn.onclick=function(){curDate=addD(curDate,1);renderToday()};
  const nowBtn=el.querySelector('#btn-now');if(nowBtn)nowBtn.onclick=function(){curDate=today();renderToday()};
  el.querySelector('#btn-ai').onclick=analyzeDay;

  refreshScore();
}

/* ══════════════════════════════════════════════════
   AI ANALYSIS
══════════════════════════════════════════════════ */
async function analyzeDay(){
  const provEl=document.getElementById('ai-prov');
  const prov=provEl?provEl.value:'anthropic';
  db.set('last_ai',prov);
  const p=AI[prov];
  if(!db.get(p.key)){openConfig('Add your '+p.label+' API key to enable AI analysis.');return}
  doSave(false);
  const d=collectDay();
  const result=document.getElementById('ai-result');
  const textEl=document.getElementById('ai-text');
  result.style.display='block';
  textEl.innerHTML='<p style="font-family:var(--mono);font-size:9.5px;color:var(--t3);font-style:normal;letter-spacing:.08em">// TRANSMITTING...</p>';
  document.getElementById('btn-ai').disabled=true;
  const sc=calcScore(d);
  const dt=d.habits&&d.habits.daytype?d.habits.daytype:'workday';

  let habLines='';
  ALL_HABS.filter(function(h){return h.weight>0}).forEach(function(h){
    const v=d.habits[h.id];
    if(h.type==='bool')habLines+=(v?'[✓]':'[ ]')+' '+h.label+'\n';
    else if(h.type==='qty')habLines+='['+(v||0)+(h.unit?' '+h.unit:'')+'] '+h.label+'\n';
    else if(h.type==='sel')habLines+='['+(v||'—')+'] '+h.label+'\n';
  });

  const prompt='You are a direct, science-aware daily log analyst. Like a knowledgeable friend — not a therapist.\n\n'
    +'Date: '+fmtFull(curDate)+' ('+(isWeekend(curDate)?'weekend':'weekday')+', '+dt+')\n'
    +'Score: '+sc.grade+' — '+sc.pts+'/'+sc.maxPts+'\n'
    +'Mood: '+(d.mood!=null?d.mood:'—')+'/10 · Energy: '+(d.energy!=null?d.energy:'—')+'/10 · Calm: '+(d.anxiety!=null?d.anxiety:'—')+'/10\n'
    +'Wake: '+(d.wakeTime||'—')+' · Sleep: '+(d.sleepH!=null?d.sleepH:'—')+'h · Sleep quality: '+(d.sleepQ!=null?d.sleepQ:'—')+'/10\n'
    +'Drinks today: '+(d.habits.alcohol_amt||0)+'\n'
    +'Habits:\n'+habLines
    +'Notes: "'+(d.notes||'(none)')+'"\n\n'
    +'Rules: connect dots when real (low sleep → low energy → worse habits). Account for day type — workday with zero social is normal, free day with zero social is worth noting. If they did something small (just 5 pages) acknowledge the minimum win. If alcohol was logged, note the sleep/recovery consequence neutrally. One tiny concrete action for tomorrow. 2-3 short paragraphs. No bullets. No emoji. Max 180 words.';

  try{
    const text=await callAI(prov,prompt);
    let html='';
    text.split('\n\n').filter(Boolean).forEach(function(para){html+='<p>'+para+'</p>'});
    textEl.innerHTML=html;
  }catch(e){
    const msg=e.message==='NO_KEY'?'Configure '+p.label+' key in Config.':'Error: '+e.message;
    textEl.innerHTML='<p style="font-family:var(--mono);font-size:9.5px;color:var(--red);font-style:normal">'+msg+'</p>';
  }
  document.getElementById('btn-ai').disabled=false;
}

/* ══════════════════════════════════════════════════
   ANALYTICS UTILS
══════════════════════════════════════════════════ */
function getLast(n){
  const r=[];
  for(let i=n-1;i>=0;i--){const d=addD(today(),-i);r.push({date:d,data:getDay(d)||DEF_DAY()})}
  return r;
}
function avg(arr){
  const v=arr.filter(function(x){return x!=null});
  return v.length?v.reduce(function(a,b){return a+b},0)/v.length:null;
}

function lineChart(values,opts){
  opts=opts||{};
  const w=opts.w||460,h=opts.h||52,color=opts.color||'var(--acc)';
  const valid=values.filter(function(v){return v!=null});
  if(valid.length<2)return'<div class="no-data">// insufficient data yet</div>';
  const mn=Math.min.apply(null,valid),mx=Math.max.apply(null,valid),rng=mx-mn||1;
  const px=8,py=5,cw=w-px*2,ch=h-py*2;
  const pts=values.map(function(v,i){
    return v==null?null:{x:px+(i/(values.length-1))*cw,y:py+ch-((v-mn)/rng)*ch};
  });
  let path='';
  pts.forEach(function(p,i){
    if(!p)return;
    const prev=pts.slice(0,i).reverse().find(Boolean);
    path+=prev?(' L'+p.x+','+p.y):('M'+p.x+','+p.y);
  });
  let circles='';
  pts.filter(Boolean).forEach(function(p){
    circles+='<circle cx="'+p.x+'" cy="'+p.y+'" r="1.6" fill="'+color+'"/>';
  });
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none">'
    +'<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="1.2" stroke-linecap="square" opacity=".9"/>'
    +circles+'</svg>';
}

function deltaEl(cur,prev,unit){
  unit=unit||'';
  if(cur==null||prev==null)return'';
  const d=cur-prev;
  if(Math.abs(d)<0.15)return'<div class="stat-delta dn">= stable</div>';
  return d>0
    ?'<div class="stat-delta du">↑ +'+d.toFixed(1)+unit+'</div>'
    :'<div class="stat-delta dd">↓ '+d.toFixed(1)+unit+'</div>';
}

function statBox(lbl,val,sub,delta){
  const emptyClass=val==null?' empty':'';
  const valTxt=val!=null?val:'—';
  return '<div class="stat">'
    +'<div class="stat-lbl">'+lbl+'</div>'
    +'<div class="stat-val'+emptyClass+'">'+valTxt+'</div>'
    +(sub?'<div class="stat-sub">'+sub+'</div>':'')
    +(delta||'')
    +'</div>';
}

  const dayScores=days.map(function(d){
    const f=d.data.mood!=null||d.data.sleepH!=null||Object.values(d.data.habits||{}).some(Boolean);

  let habTableRows='';
  habStats.forEach(function(h){
    const pct=Math.round(h.done/7*100);
    const barColor=h.done>=6?'var(--grn)':h.done>=4?'var(--acc)':'var(--red)';
    habTableRows+='<tr>'
      +'<td>'+h.label+'</td>'
      +'<td><div class="hbar-wrap"><div class="hbar" style="width:'+pct+'%;background:'+barColor+'"></div></div></td>'
      +'<td>'+h.done+'/7 · '+pct+'%</td>'
      +'</tr>';
  });

  let lblSpans='';
  labels.forEach(function(l){lblSpans+='<span>'+l+'</span>'});

    +'<div class="stat-grid">'
    +statBox('Avg Mood',aM!=null?aM.toFixed(1):null,'',deltaEl(aM,pM))
    +statBox('Avg Energy',aE!=null?aE.toFixed(1):null)
    +statBox('Avg Sleep',aS!=null?aS.toFixed(1)+'h':null,'',deltaEl(aS,pS,'h'))
    +statBox('Sleep Quality',aQ!=null?aQ.toFixed(1):null)
    +statBox('Avg Water',waterAvg!=null?waterAvg.toFixed(0)+'gl':null)
    +statBox('Alcohol days',alcDays+'/7','',alcDays>2?'<div class="stat-delta dd">review this</div>':'')
    +'</div>'
    +'<div class="sec"><div class="sec-hd"><span class="sec-label">Daily Scores</span></div>'
    +'<div style="display:flex;gap:3px;flex-wrap:wrap">'+scoreCells+'</div></div>'
    +'<div class="chart-wrap"><div class="chart-lbl">// MOOD — 7 days</div>'+lineChart(moods)+'<div class="chart-lbls">'+lblSpans+'</div></div>'
    +'<div class="chart-wrap"><div class="chart-lbl">// SLEEP (hours)</div>'+lineChart(sleeps,{color:'var(--blu)'})+'<div class="chart-lbls">'+lblSpans+'</div></div>'
    +'<div class="sec"><div class="sec-hd"><span class="sec-label">Habit Adherence</span><span class="sec-count">7-day</span></div>'
    +'<table class="hab-table">'+habTableRows+'</table></div>';
}

/* ══════════════════════════════════════════════════
   RENDER MEDIA
══════════════════════════════════════════════════ */
function renderMedia(){
  const el=document.getElementById('v-media');
  const media=getMedia();
  const items=media[mediaTab]||[];

  const active =items.filter(function(i){return['Playing','Watching','Reading'].indexOf(i.status)>=0});
  const paused =items.filter(function(i){return i.status==='Paused'});
  const backlog =items.filter(function(i){return i.status==='Backlog'});
  const done    =items.filter(function(i){return['Completed','Finished','Watched'].indexOf(i.status)>=0});

  function ct(t){
    return(media[t]||[]).filter(function(i){return['Playing','Watching','Reading'].indexOf(i.status)>=0}).length;
  }

  function progressPct(item){
    if(!item.progress)return null;
    const p=item.progress;
    if(typeof p==='number')return Math.min(p,100);
    const m=String(p).match(/(\d+)/);
    return m?Math.min(parseInt(m[1]),100):null;
  }

  function mpRow(item,idx){
    const pct=progressPct(item);
    const col=STATUS_DOT_COLOR[item.status]||'var(--t4)';
    const metaParts=[item.kind||null,item.author||null,item.progress||null].filter(Boolean);
    const meta=metaParts.length?metaParts.join(' · '):item.status;
    let progressBar='';
    if(pct!=null&&mediaTab==='books'){
      progressBar='<div class="mp-progress-track"><div class="mp-progress-fill" style="width:'+pct+'%"></div></div>';
    }
    const rating=item.rating?'<div class="mp-rating">'+item.rating+'/10</div>':'';
    return '<div class="media-progress-row">'
      +'<div class="mp-status-dot" style="background:'+col+'"></div>'
      +'<div class="mp-info">'
      +'<div class="mp-title">'+item.title+'</div>'
      +'<div class="mp-meta">'+meta+'</div>'
      +'</div>'
      +progressBar+rating
      +'<button class="mp-del" data-idx="'+idx+'">×</button>'
      +'</div>';
  }

  // Tabs
  let tabsHtml='';
  Object.keys(MEDIA_DEF).forEach(function(k){
    const v=MEDIA_DEF[k];
    const onCls=mediaTab===k?' on':'';
    const ctNum=ct(k)||'';
    tabsHtml+='<button class="mtab'+onCls+'" data-tab="'+k+'">'+v.label+'<span class="mtab-ct">'+ctNum+'</span></button>';
  });

  // Active block
  let activeRows='';
  active.forEach(function(item){activeRows+=mpRow(item,items.indexOf(item))});
  const activeBlock='<div class="media-block">'
    +'<div class="media-block-hd">'
    +'<span class="media-block-title">▸ IN PROGRESS'+(active.length?' ('+active.length+')':'')+'</span>'
    +'<button class="media-col-add" id="btn-add">+ ADD</button>'
    +'</div>'
    +(active.length?activeRows:'<div class="mi-empty">// nothing active</div>')
    +'</div>';

  // Paused block
  let pausedBlock='';
  if(paused.length){
    let rows='';
    paused.forEach(function(item){rows+=mpRow(item,items.indexOf(item))});
    pausedBlock='<div class="media-block">'
      +'<div class="media-block-hd"><span class="media-block-title">▸ PAUSED ('+paused.length+')</span></div>'
      +rows+'</div>';
  }

  // Backlog block
  let backlogRows='';
  backlog.forEach(function(item){backlogRows+=mpRow(item,items.indexOf(item))});
  const backlogBlock='<div class="media-block">'
    +'<div class="media-block-hd"><span class="media-block-title">▸ BACKLOG'+(backlog.length?' ('+backlog.length+')':'')+'</span></div>'
    +(backlog.length?backlogRows:'<div class="mi-empty">// empty</div>')
    +'</div>';

  // Done block
  let doneBlock='';
  if(done.length){
    let rows='';
    done.slice(0,8).forEach(function(item){rows+=mpRow(item,items.indexOf(item))});
    if(done.length>8)rows+='<div class="mi-empty" style="margin-top:3px">// +'+(done.length-8)+' more in Year Log</div>';
    doneBlock='<div class="media-block">'
      +'<div class="media-block-hd"><span class="media-block-title">▸ DONE ('+done.length+')</span></div>'
      +rows+'</div>';
  }

  el.innerHTML=
    '<div class="ph"><div class="ph-left"><div class="ph-title">LIBRARY</div></div></div>'
    +'<div class="mtabs">'+tabsHtml+'</div>'
    +'<div class="media-cols">'
    +'<div>'+activeBlock+pausedBlock+'</div>'
    +'<div>'+backlogBlock+doneBlock+'</div>'
    +'</div>';

  el.querySelectorAll('.mtab').forEach(function(t){
    t.onclick=function(){mediaTab=t.dataset.tab;renderMedia()};
  });
  el.querySelectorAll('.mp-del').forEach(function(b){
    b.onclick=function(){
      const m=getMedia();
      m[mediaTab].splice(parseInt(b.dataset.idx),1);
      saveMedia(m);renderMedia();
    };
  });
  const addBtn=el.querySelector('#btn-add');
  if(addBtn)addBtn.onclick=function(){openAddModal(mediaTab)};
}

/* ══════════════════════════════════════════════════
   RENDER YEAR
══════════════════════════════════════════════════ */
function renderYear(){
  const el=document.getElementById('v-year');
  const media=getMedia();
  const yr=thisYear();
  const completed=[];
  Object.keys(MEDIA_DEF).forEach(function(type){
    const def=MEDIA_DEF[type];
    (media[type]||[]).forEach(function(item){
      if(def.yearDone.indexOf(item.status)>=0&&(!item.year||item.year===yr)){
        const it=Object.assign({},item,{_type:type});
        completed.push(it);
      }
    });
  });

  const byType={};
  Object.keys(MEDIA_DEF).forEach(function(t){byType[t]=completed.filter(function(i){return i._type===t})});
  const rated=completed.filter(function(i){return i.rating});
  const avgR=rated.length?(rated.reduce(function(a,b){return a+(b.rating||0)},0)/rated.length).toFixed(1):null;

  let stats='<div class="stat-grid" style="margin-bottom:1.1rem">'
    +statBox('Total done',completed.length)
    +statBox('Games',byType.games?byType.games.length:0)
    +statBox('Shows/Films',byType.screen?byType.screen.length:0)
    +statBox('Books',byType.books?byType.books.length:0);
  if(avgR)stats+='<div class="stat"><div class="stat-lbl">Avg Score</div><div class="stat-val">'+avgR+'</div><div class="stat-sub">out of 10</div></div>';
  stats+='</div>';

  let typesSections='';
  Object.keys(byType).forEach(function(type){
    const items=byType[type];
    if(!items.length)return;
    let cards='';
    items.forEach(function(item){
      const typeTag=item.kind?'<div class="ycard-type">'+item.kind+'</div>':'';
      const metaTag=item.author||item.progress?'<div class="ycard-meta">'+(item.author||item.progress)+'</div>':'';
      const scoreTag=item.rating?'<div class="ycard-score">'+item.rating+'/10</div>':'';
      cards+='<div class="ycard">'+typeTag+'<div class="ycard-title">'+item.title+'</div>'+metaTag+scoreTag+'</div>';
    });
    typesSections+='<div class="sec"><div class="sec-hd"><span class="sec-label">'+MEDIA_DEF[type].label+'</span></div>'
      +'<div class="year-cards">'+cards+'</div></div>';
  });

  const emptyMsg=completed.length===0?'<div style="font-family:var(--mono);font-size:9.5px;color:var(--t4);padding:.4rem 0">// Mark items as completed and they appear here.</div>':'';

  el.innerHTML=
    '<div class="ph"><div class="ph-left"><div class="ph-title">THIS YEAR</div><div class="ph-sub">completed in '+yr+'</div></div></div>'
    +stats+emptyMsg+typesSections;
}

/* ══════════════════════════════════════════════════
   ADD MODAL
══════════════════════════════════════════════════ */
function openAddModal(type){
  const def=MEDIA_DEF[type];
  const modal=document.getElementById('modal');
  modal.classList.remove('hide');

  let fieldsHtml='';
  def.fields.forEach(function(f){
    let input='';
    if(f.type==='select'){
      let opts='<option value="">—</option>';
      f.opts.forEach(function(o){opts+='<option>'+o+'</option>'});
      input='<select class="mf-input" id="mf-'+f.id+'">'+opts+'</select>';
    }else{
      const minAttr=f.min!=null?' min='+f.min:'';
      const maxAttr=f.max!=null?' max='+f.max:'';
      const phAttr=f.ph?' placeholder="'+f.ph+'"':'';
      input='<input class="mf-input" type="'+(f.type||'text')+'" id="mf-'+f.id+'"'+phAttr+minAttr+maxAttr+'>';
    }
    fieldsHtml+='<div class="mf"><div class="mf-label">'+f.label+'</div>'+input+'</div>';
  });

  modal.innerHTML='<div class="mbox">'
    +'<div class="mbox-title">+ '+def.sing.toUpperCase()+'</div>'
    +fieldsHtml
    +'<div class="mactions">'
    +'<button class="btn-s" id="m-cancel">CANCEL</button>'
    +'<button class="btn-p" id="m-save">ADD</button>'
    +'</div></div>';

  modal.querySelector('#m-cancel').onclick=function(){modal.classList.add('hide')};
  modal.onclick=function(e){if(e.target===modal)modal.classList.add('hide')};
  modal.querySelector('#m-save').onclick=function(){
    const titleEl=document.getElementById('mf-title');
    const title=titleEl?titleEl.value.trim():'';
    if(!title)return;
    const item={id:Date.now()};
    def.fields.forEach(function(f){
      const e=document.getElementById('mf-'+f.id);
      if(e)item[f.id]=f.type==='number'?(parseFloat(e.value)||null):(e.value||null);
    });
    if(!item.status){
      const sf=def.fields.find(function(f){return f.id==='status'});
      item.status=sf&&sf.opts?sf.opts[0]:'';
    }
    if(def.yearDone.indexOf(item.status)>=0&&!item.year)item.year=thisYear();
    const m=getMedia();
    m[type].unshift(item);
    saveMedia(m);
    modal.classList.add('hide');
    renderMedia();
  };
}

/* ══════════════════════════════════════════════════
   CONFIG MODAL
══════════════════════════════════════════════════ */
function openConfig(msg){
  msg=msg||'';
  const modal=document.getElementById('modal');
  modal.classList.remove('hide');

  let keyFields='';
  Object.keys(AI).forEach(function(k){
    const p=AI[k];
    const val=db.get(p.key)||'';
    keyFields+='<div class="mf"><div class="mf-label">'+p.label+'</div>'
      +'<input class="mf-input" type="password" id="key-'+k+'" value="'+val+'" placeholder="'+p.hint+'"></div>';
  });

  const msgHtml=msg?'<p style="font-family:var(--mono);font-size:8.5px;color:var(--red);margin-bottom:10px;letter-spacing:.06em">'+msg+'</p>':'';

  modal.innerHTML='<div class="mbox">'
    +'<div class="mbox-title">CONFIG — API KEYS</div>'
    +msgHtml
    +'<div class="minfo">API keys are stored only in your browser localStorage. Nothing leaves your device.</div>'
    +keyFields
    +'<div class="mactions">'
    +'<button class="btn-s" id="s-cancel">CANCEL</button>'
    +'<button class="btn-p" id="s-save">SAVE</button>'
    +'</div></div>';

  modal.querySelector('#s-cancel').onclick=function(){modal.classList.add('hide')};
  modal.onclick=function(e){if(e.target===modal)modal.classList.add('hide')};
  modal.querySelector('#s-save').onclick=function(){
    Object.keys(AI).forEach(function(k){
      const p=AI[k];
      const el=document.getElementById('key-'+k);
      if(el){const v=el.value.trim();if(v)db.set(p.key,v);}
    });
    modal.classList.add('hide');
  };
}

document.getElementById('cfg-btn').onclick=function(){openConfig()};

// ── INIT ───────────────────────────────────────────
renderToday();
</script>
